# Configuración de Servidor
server.port=8080

# Base de Datos
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/malviaja2?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Logs
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Security (evita password generado en consola)
spring.security.user.name=disabled
spring.security.user.password=disabled

# Telegram Bot — valores cargados desde variables de entorno (ver .env.example)
telegram.bot.username=${TELEGRAM_BOT_USERNAME:placeholder_bot}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:placeholder_token}
telegram.bot.admin-chat-id=${TELEGRAM_ADMIN_CHAT_ID:000000}

# CORS — en producción pon tu dominio de Vercel separado por comas
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://malviaja2.vercel.app}

# Carga de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini OCR
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}

# Admin UID (Firebase UID del administrador del sistema)
app.admin.uid=${ADMIN_UID:}
